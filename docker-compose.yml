
services:
  supabase-db:
    image: postgres:15
    container_name: supabase-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/init.sql:/docker-entrypoint-initdb.d/init.sql

  collector:
    build: ./backup-collector
    container_name: backup-collector
    depends_on:
      - supabase-db
    env_file:
      - ./backup-collector/.env
    restart: always

  dashboard:
    build: ./dashboard
    container_name: backup-dashboard
    depends_on:
      - supabase-db
    environment:
      SUPABASE_HOST: supabase-db
      SUPABASE_USER: postgres
      SUPABASE_PASSWORD: postgres
      SUPABASE_DB: postgres
    ports:
      - "3000:3000"
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - supabase-db

volumes:
  pgdata: