
services:
  supabase-db:
    image: postgres:15
    container_name: supabase-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  collector:
    build: ./backup-collector
    container_name: backup-collector
    depends_on:
      supabase-db:
        condition: service_healthy
    env_file:
      - ./backup-collector/.env
    environment:
      MASTER_KEY: ${MASTER_KEY:-change-me-to-a-strong-random-secret-key}
    restart: always

  dashboard:
    build: ./dashboard
    container_name: backup-dashboard
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      SUPABASE_HOST: supabase-db
      SUPABASE_USER: postgres
      SUPABASE_PASSWORD: postgres
      SUPABASE_DB: postgres
    ports:
      - "3000:3000"
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - ./supabase/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      supabase-db:
        condition: service_healthy

volumes:
  pgdata: